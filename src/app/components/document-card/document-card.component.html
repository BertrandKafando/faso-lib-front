<div class="rounded-xl border bg-card text-card-foreground shadow group h-full flex flex-col transition-all duration-300 hover:shadow-lg hover:-translate-y-1 border-border/60 overflow-hidden">
  <div class="relative h-40 bg-gradient-to-br from-primary/5 to-primary/10 flex items-center justify-center overflow-hidden">
    <!-- Preview -->
    <img *ngIf="document.previewUrl; else placeholder" 
         [src]="document.previewUrl" 
         [alt]="document.title" 
         class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
    >
    <ng-template #placeholder>
      <lucide-icon [img]="FileText" class="h-16 w-16 text-primary/20 group-hover:text-primary/40 transition-colors"></lucide-icon>
    </ng-template>
    
    <div class="absolute top-2 right-2">
      <span *ngIf="isFree; else paid" class="inline-flex items-center rounded-md border px-2.5 py-0.5 text-xs font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 border-transparent bg-secondary text-secondary-foreground font-medium shadow-sm">
        Gratuit
      </span>
      <ng-template #paid>
        <span class="inline-flex items-center rounded-md border px-2.5 py-0.5 text-xs font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 border-transparent bg-accent text-accent-foreground font-medium shadow-sm">
          {{ document.price | number:'1.0-0' }} CFA
        </span>
      </ng-template>
    </div>
  </div>

  <div class="p-6 pt-0 pb-2 mt-6">
    <h3 class="font-serif font-bold text-lg leading-tight line-clamp-2 group-hover:text-primary transition-colors">
      <a [routerLink]="['/documents', document.id]">{{ document.title }}</a>
    </h3>
    <p class="text-sm text-muted-foreground font-medium mt-2">
      Par {{ document.authorName }}
    </p>
  </div>

  <div class="p-6 pt-0 flex-grow pb-2">
    <p class="text-sm text-muted-foreground line-clamp-3">
      {{ document.description }}
    </p>
  </div>

  <div class="p-6 pt-2 mt-auto">
    <a [routerLink]="['/documents', document.id]">
      <p-button styleClass="w-full bg-primary/5 hover:bg-primary/10 text-primary shadow-none border-0 h-10 px-4 py-2" [label]="isFree ? 'Consulter' : 'Voir détails'" [icon]="isFree ? 'pi pi-eye' : 'pi pi-lock'">
      </p-button>
    </a>
  </div>
</div>
