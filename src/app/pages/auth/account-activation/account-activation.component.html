<div class="min-h-screen bg-background flex items-center justify-center p-4 text-foreground">
  <div class="max-w-md w-full text-center">

    <!-- Logo -->
    <div class="inline-flex items-center gap-2 mb-8">
      <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-primary-foreground shadow-lg shadow-primary/20">
        <lucide-icon [img]="GraduationCapIcon" class="w-6 h-6"></lucide-icon>
      </div>
      <span class="text-xl font-bold text-foreground">FasoLib</span>
    </div>

    <div class="bg-card p-10 rounded-3xl shadow-xl border border-border">

      <!-- Loading -->
      <div *ngIf="status === 'loading'" class="space-y-4">
        <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center mx-auto">
          <lucide-icon [img]="LoaderIcon" class="w-8 h-8 text-primary animate-spin"></lucide-icon>
        </div>
        <h2 class="text-xl font-bold text-foreground">Activation en cours...</h2>
        <p class="text-muted-foreground">Veuillez patienter pendant la vérification de votre lien.</p>
      </div>

      <!-- Success -->
      <div *ngIf="status === 'success'" class="space-y-4">
        <div class="w-16 h-16 rounded-full bg-secondary/10 flex items-center justify-center mx-auto">
          <lucide-icon [img]="CheckCircleIcon" class="w-8 h-8 text-secondary"></lucide-icon>
        </div>
        <h2 class="text-xl font-bold text-foreground">Compte activé ! 🎉</h2>
        <p class="text-muted-foreground">{{ message }}</p>
        <a routerLink="/login"
           class="inline-flex items-center gap-2 mt-2 px-6 py-3 bg-primary text-primary-foreground rounded-2xl font-bold hover:bg-primary/90 transition-all shadow-lg shadow-primary/20">
          <lucide-icon [img]="LogInIcon" class="w-4 h-4"></lucide-icon>
          Se connecter maintenant
        </a>
      </div>

      <!-- Error -->
      <div *ngIf="status === 'error'" class="space-y-4">
        <div class="w-16 h-16 rounded-full bg-destructive/10 flex items-center justify-center mx-auto">
          <lucide-icon [img]="XCircleIcon" class="w-8 h-8 text-destructive"></lucide-icon>
        </div>
        <h2 class="text-xl font-bold text-foreground">Activation échouée</h2>
        <p class="text-muted-foreground">{{ message }}</p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center pt-2">
          <a routerLink="/register"
             class="inline-flex items-center justify-center gap-2 px-5 py-2.5 border border-border rounded-2xl font-medium text-sm hover:bg-muted/50 transition-all">
            Nouvelle inscription
          </a>
          <a routerLink="/login"
             class="inline-flex items-center justify-center gap-2 px-5 py-2.5 bg-primary text-primary-foreground rounded-2xl font-medium text-sm hover:bg-primary/90 transition-all">
            <lucide-icon [img]="LogInIcon" class="w-4 h-4"></lucide-icon>
            Connexion
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
