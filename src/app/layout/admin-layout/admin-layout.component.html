<div class="flex h-screen bg-background overflow-hidden text-foreground">
  <!-- Sidebar -->
  <aside 
    [class.w-72]="isSidebarOpen" 
    [class.w-20]="!isSidebarOpen"
    class="relative h-screen bg-sidebar border-r border-sidebar-border transition-all duration-300 ease-in-out flex flex-col z-30"
  >
    <!-- Logo Area -->
    <div class="h-16 flex items-center px-6 border-b border-sidebar-border mb-4">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-primary-foreground font-bold text-xl shadow-lg shadow-primary/20">
          F
        </div>
        <span *ngIf="isSidebarOpen" class="font-bold text-foreground text-lg tracking-tight truncate" [class.hidden]="!isSidebarOpen">
          Faso Library
        </span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 space-y-1">
      <a 
        *ngFor="let item of adminNavItems"
        [routerLink]="item.href" 
        routerLinkActive="bg-primary/10 text-primary" 
        [routerLinkActiveOptions]="{exact: item.exact || false}"
        class="flex items-center px-3 py-3 rounded-xl transition-all group hover:bg-muted/50 text-muted-foreground"
      >
        <lucide-icon [img]="item.icon" class="w-5 h-5 min-w-[20px]"></lucide-icon>
        <span class="ml-3 font-medium text-sm transition-opacity duration-300" [class.opacity-0]="!isSidebarOpen" [class.hidden]="!isSidebarOpen">
          {{ item.labelKey | translate }}
        </span>
      </a>

      <div class="pt-4 pb-2">
        <div class="px-4 text-[10px] font-bold text-muted-foreground uppercase tracking-widest" [class.hidden]="!isSidebarOpen">
          Système
        </div>
      </div>

      <a 
        *ngFor="let item of systemNavItems"
        [routerLink]="item.href" 
        routerLinkActive="bg-primary/10 text-primary"
        class="flex items-center px-3 py-3 rounded-xl transition-all group hover:bg-muted/50 text-muted-foreground"
      >
        <lucide-icon [img]="item.icon" class="w-5 h-5 min-w-[20px]"></lucide-icon>
        <span class="ml-3 font-medium text-sm transition-opacity duration-300" [class.opacity-0]="!isSidebarOpen" [class.hidden]="!isSidebarOpen">
          {{ item.labelKey | translate }}
        </span>
      </a>
    </nav>

    <!-- User Section -->
    <div class="mt-auto border-t border-sidebar-border p-4 relative">
      <!-- Profile Dropdown (opens upwards) -->
      <div 
        *ngIf="isProfileOpen" 
        class="absolute bottom-full left-4 mb-2 w-64 bg-card rounded-2xl shadow-2xl border border-border p-2 animate-in slide-in-from-bottom-2 fade-in zoom-in-95 z-[60]"
      >
        <div class="px-3 py-3 mb-2 bg-muted/30 rounded-xl">
          <div class="flex flex-col space-y-1">
            <p class="text-sm font-bold text-foreground truncate">
              {{authService.user()?.firstName}} {{authService.user()?.lastName}}
            </p>
            <p class="text-xs text-muted-foreground truncate">{{authService.user()?.email}}</p>
          </div>
        </div>
        
        <div class="space-y-1">
          <a
            routerLink="/profile"
            (click)="isProfileOpen = false"
            class="flex items-center rounded-xl px-3 py-2.5 text-sm font-medium transition-colors hover:bg-muted text-foreground hover:text-primary group"
          >
            <lucide-icon [img]="UserIcon" class="mr-3 h-4 w-4 text-muted-foreground group-hover:text-primary"></lucide-icon>
            <span [translate]="'NAV.PROFILE'"></span>
          </a>
        </div>

        <div class="h-px bg-border my-2"></div>
        
        <button
          (click)="logout()"
          class="w-full flex items-center rounded-xl px-3 py-2.5 text-sm font-bold transition-colors hover:bg-destructive/10 text-destructive"
        >
          <lucide-icon [img]="LogOutIcon" class="mr-3 h-4 w-4"></lucide-icon>
          <span [translate]="'NAV.LOGOUT'"></span>
        </button>
      </div>

      <div 
        (click)="toggleProfile()"
        class="flex items-center gap-4 transition-all cursor-pointer p-2 rounded-xl hover:bg-muted/50" 
        [class.justify-center]="!isSidebarOpen"
      >
        <img 
          [src]="authService.user()?.profilePicture || 'https://ui-avatars.com/api/?name=' + (authService.user()?.firstName || 'User')" 
          class="w-10 h-10 rounded-full border-2 border-border shadow-sm"
          alt="Avatar"
        >
        <div class="flex-1 min-w-0" [class.hidden]="!isSidebarOpen">
          <p class="text-sm font-semibold text-foreground truncate">
            {{authService.user()?.firstName}}
          </p>
          <p class="text-xs text-muted-foreground truncate">Admin</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col min-w-0">
    <!-- Topbar -->
    <header class="h-16 bg-background/95 backdrop-blur supports-[backdrop-filter]:bg-background/60 border-b border-border flex items-center justify-between px-6 sticky top-0 z-20">
      <div class="flex items-center gap-4">
        <button 
          (click)="toggleSidebar()"
          class="p-2 hover:bg-muted/50 rounded-lg transition-all text-muted-foreground"
        >
          <lucide-icon [img]="isSidebarOpen ? XIcon : MenuIcon" class="w-5 h-5"></lucide-icon>
        </button>
        
        <div class="hidden sm:flex items-center bg-muted/30 border border-border rounded-full px-4 py-2 w-80 focus-within:border-primary/50 focus-within:ring-2 focus-within:ring-primary/10 transition-all">
          <lucide-icon [img]="SearchIcon" class="w-4 h-4 text-muted-foreground"></lucide-icon>
          <input 
            type="text" 
            placeholder="Rechercher..." 
            class="bg-transparent border-none focus:ring-0 text-sm ml-2 w-full text-foreground placeholder:text-muted-foreground"
          >
        </div>
      </div>

      <div class="flex items-center gap-3">
        <!-- Theme Toggle -->
        <app-theme-toggle></app-theme-toggle>

        <!-- Language Switcher -->
        <div class="flex items-center bg-muted/50 rounded-full p-1 border border-border">
          <button 
            (click)="changeLanguage('fr')"
            [class.bg-card]="translate.currentLang === 'fr'"
            [class.shadow-sm]="translate.currentLang === 'fr'"
            [class.text-primary]="translate.currentLang === 'fr'"
            class="px-2.5 py-1 rounded-full text-[10px] font-bold transition-all text-muted-foreground hover:text-primary"
          >FR</button>
          <button 
            (click)="changeLanguage('en')"
            [class.bg-card]="translate.currentLang === 'en'"
            [class.shadow-sm]="translate.currentLang === 'en'"
            [class.text-primary]="translate.currentLang === 'en'"
            class="px-2.5 py-1 rounded-full text-[10px] font-bold transition-all text-muted-foreground hover:text-primary"
          >EN</button>
        </div>

        <button class="relative p-2 text-muted-foreground hover:bg-muted/50 rounded-full transition-colors mr-2">
          <lucide-icon [img]="BellIcon" class="w-5 h-5"></lucide-icon>
          <span class="absolute top-2 right-2 w-2 h-2 bg-accent border-2 border-card rounded-full"></span>
        </button>

        <a routerLink="/" class="text-sm font-medium text-muted-foreground hover:text-primary transition-colors">
          Retour au site
        </a>
      </div>
    </header>

    <!-- Page Content -->
    <div class="flex-1 overflow-y-auto p-6 md:p-10">
      <div class="max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </div>
  </main>
</div>
