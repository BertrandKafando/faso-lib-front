<p-dialog 
  [(visible)]="visible" 
  [style]="{width: '450px'}" 
  [header]="(discipline.id ? 'ADMIN.PAGEDISCIPLINES.EDIT_TITLE' : 'ADMIN.PAGEDISCIPLINES.NEW_TITLE') | translate" 
  [modal]="true" 
  styleClass="p-fluid"
  (onHide)="hideDialog()"
>
  <ng-template pTemplate="content">
    <div class="field mb-4">
      <label for="name" class="block text-sm font-medium mb-1">{{ 'ADMIN.PAGEDISCIPLINES.NAME' | translate }}</label>
      <input 
        type="text" 
        pInputText 
        id="name" 
        [(ngModel)]="discipline.name" 
        required 
        autofocus 
        [class.ng-invalid]="submitted && !discipline.name"
        [class.ng-dirty]="submitted && !discipline.name"
      />
      <small class="text-destructive font-bold" *ngIf="submitted && !discipline.name">Name is required.</small>
    </div>

    <div class="field mb-4">
      <label for="code" class="block text-sm font-medium mb-1">{{ 'ADMIN.PAGEDISCIPLINES.CODE' | translate }}</label>
      <input 
        type="text" 
        pInputText 
        id="code" 
        [(ngModel)]="discipline.code" 
        required
        [class.ng-invalid]="submitted && !discipline.code"
        [class.ng-dirty]="submitted && !discipline.code"
      />
      <small class="text-destructive font-bold" *ngIf="submitted && !discipline.code">Code is required.</small>
    </div>

    <div class="field mb-4">
      <label for="description" class="block text-sm font-medium mb-1">{{ 'ADMIN.PAGEDISCIPLINES.DESCRIPTION' | translate }}</label>
      <textarea 
        id="description" 
        pInputTextarea 
        [(ngModel)]="discipline.description" 
        required 
        rows="3" 
        cols="20"
        class="w-full"
      ></textarea>
    </div>
  </ng-template>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2 p-4">
      <p-button 
        [label]="'ADMIN.PAGEDISCIPLINES.CANCEL' | translate" 
        icon="pi pi-times" 
        styleClass="p-button-text" 
        (click)="hideDialog()"
      ></p-button>
      <p-button 
        [label]="'ADMIN.PAGEDISCIPLINES.SAVE' | translate" 
        icon="pi pi-check" 
        styleClass="p-button-primary" 
        (click)="save()"
      ></p-button>
    </div>
  </ng-template>
</p-dialog>
